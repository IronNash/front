<app-cte-modal-shell
  [open]="open()"
  overlayTier="cte-new-doc-picker"
  [panelMaxWidthClass]="'max-w-5xl'"
  [ariaLabelledBy]="'cte-new-title'"
  (backdropDismiss)="onBackdropClick()"
  (closeRequested)="close()"
>
  <div cteModalShellHeading>
    <h3 id="cte-new-title" class="text-xl font-semibold text-slate-900 sm:text-2xl">Novo CTe</h3>
    <p class="mt-1 max-w-2xl text-sm leading-relaxed text-slate-600">
      Escolha o documento que melhor descreve o que você tem em mãos. Isso só define por onde começamos o assistente — você pode ajustar tudo nas
      próximas etapas.
    </p>
  </div>
  <button type="button" class="btn-secondary text-sm" cteModalShellToolbar (click)="requestHelp()">Como fazer</button>

  <div class="grid gap-3 sm:grid-cols-2 xl:grid-cols-4">
    @for (card of documentCards; track card.id) {
      <button
        type="button"
        class="group flex min-h-[9.5rem] flex-col rounded-xl border border-slate-200 bg-slate-50/40 p-4 text-left transition hover:border-blue-400 hover:bg-white hover:shadow-md focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-blue-600"
        (click)="pickDocument(card.id)"
      >
        <span
          class="mb-3 inline-flex h-11 w-11 items-center justify-center rounded-lg border border-blue-100 bg-blue-50 text-blue-600 transition group-hover:border-blue-200 group-hover:bg-blue-100/80"
          aria-hidden="true"
        >
          @switch (card.id) {
            @case ('nfe') {
              <svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"
                />
              </svg>
            }
            @case ('third-party-cte') {
              <svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m0 0h12.75m0 0h.008v.008H12.75m-12.75 0V9.375c0-.621.504-1.125 1.125-1.125h4.125M12.75 3v11.25m0 0l3-3m-3 3l-3-3"
                />
              </svg>
            }
            @case ('rural-producer') {
              <svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10"
                />
              </svg>
            }
            @case ('other') {
              <svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"
                />
              </svg>
            }
          }
        </span>
        <span class="font-semibold text-slate-900">{{ card.title }}</span>
        <span class="mt-1 text-sm leading-snug text-slate-600">{{ card.description }}</span>
      </button>
    }
  </div>
</app-cte-modal-shell>
