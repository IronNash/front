<app-cte-modal-shell
  [open]="open()"
  overlayTier="mdfe-new-doc-picker"
  [panelMaxWidthClass]="'max-w-5xl'"
  [ariaLabelledBy]="'mdfe-new-doc-title'"
  (backdropDismiss)="onBackdropClick()"
  (closeRequested)="close()"
>
  <div cteModalShellHeading>
    <h3 id="mdfe-new-doc-title" class="text-xl font-semibold text-slate-900 sm:text-2xl">Novo MDFe</h3>
    <p class="mt-1 max-w-2xl text-sm leading-relaxed text-slate-600">
      Escolha o documento que inicia o manifesto. Isso só define por onde começamos — você pode ajustar nas próximas etapas.
    </p>
  </div>
  <button type="button" class="btn-ghost text-sm" cteModalShellToolbar (click)="goBack()">Voltar</button>
  <button type="button" class="btn-secondary text-sm" cteModalShellToolbar (click)="requestHelp()">Como fazer</button>

  <div class="grid gap-3 sm:grid-cols-2">
    @for (card of documentCards; track card.id) {
      <button type="button" class="group doc-picker-card" (click)="pickSource(card.id)">
        <span class="doc-picker-card-icon" aria-hidden="true">
          @switch (card.id) {
            @case ('nfe') {
              <svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"
                />
              </svg>
            }
            @case ('cte') {
              <svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m0 0h12.75m0 0h.008v.008H12.75m-12.75 0V9.375c0-.621.504-1.125 1.125-1.125h4.125M12.75 3v11.25m0 0l3-3m-3 3l-3-3"
                />
              </svg>
            }
          }
        </span>
        <span class="font-semibold text-slate-900">{{ card.title }}</span>
        <span class="mt-1 text-sm leading-snug text-slate-600">{{ card.description }}</span>
      </button>
    }
  </div>
</app-cte-modal-shell>
