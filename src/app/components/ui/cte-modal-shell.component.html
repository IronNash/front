@if (open()) {
  <div class="fixed inset-0" [class]="backdropClasses()" (click)="onBackdrop()" role="presentation">
    <div
      [attr.class]="'mx-auto w-full rounded-2xl border border-slate-200 bg-white ' + panelMaxWidthClass() + ' ' + panelPaddingClass()"
      (click)="$event.stopPropagation()"
      role="dialog"
      aria-modal="true"
      [attr.aria-labelledby]="ariaLabelledBy()"
    >
      <div class="mb-6 flex flex-wrap items-start justify-between gap-3">
        <div class="min-w-0 flex-1">
          <ng-content select="[cteModalShellHeading]" />
        </div>
        <div class="flex shrink-0 items-center gap-2">
          <ng-content select="[cteModalShellToolbar]" />
          <button
            type="button"
            class="rounded-md px-2 py-1 text-2xl leading-none text-slate-400 transition hover:bg-slate-100 hover:text-slate-600"
            (click)="onCloseClick()"
            [attr.aria-label]="closeButtonAriaLabel()"
          >
            x
          </button>
        </div>
      </div>
      <ng-content />
    </div>
  </div>
}
