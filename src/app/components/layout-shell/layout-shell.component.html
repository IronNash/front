<div class="min-h-screen bg-slate-50 text-slate-800">
  <div class="flex min-h-screen min-w-0">
    <aside
      class="fixed inset-y-0 left-0 z-30 w-64 border-r border-slate-200 bg-white text-slate-700 transition-transform duration-200 lg:static lg:translate-x-0"
      [class.-translate-x-full]="!sidebarOpen()"
    >
      <div class="flex h-16 items-center justify-between border-b border-slate-200 px-4">
        <span class="text-sm font-semibold tracking-wide text-slate-900">Test Board</span>
        <button
          class="rounded-md p-1 text-slate-500 hover:bg-slate-100 lg:hidden"
          (click)="onMenuClose()"
          aria-label="Fechar menu"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 6l12 12M18 6L6 18" />
          </svg>
        </button>
      </div>

      <nav class="space-y-1 px-3 py-4 text-sm">
        @for (item of menuItems(); track item) {
          <button
            type="button"
            class="flex w-full items-center rounded-lg px-3 py-2 text-left font-medium transition duration-200"
            [class.bg-blue-50]="activeTab() === item"
            [class.text-blue-700]="activeTab() === item"
            [class.text-slate-600]="activeTab() !== item"
            [class.hover:bg-slate-100]="activeTab() !== item"
            [attr.aria-current]="activeTab() === item ? 'page' : null"
            (click)="onTabChange(item)"
          >
            {{ item }}
          </button>
        }
      </nav>
    </aside>

    @if (sidebarOpen()) {
      <button
        class="fixed inset-0 z-20 bg-black/40 lg:hidden"
        (click)="onMenuClose()"
        aria-label="Fechar menu lateral"
      ></button>
    }

    <div class="min-w-0 flex-1 lg:ml-0">
      <header class="sticky top-0 z-10 border-b border-slate-200 bg-white/90 px-3 py-3 backdrop-blur sm:px-6">
        <div class="mx-auto flex w-full min-w-0 max-w-6xl items-center justify-between gap-2">
          <div class="flex items-center gap-3">
            <button
              class="rounded-md border border-slate-300 px-3 py-1.5 text-sm transition hover:bg-slate-50 lg:hidden"
              (click)="onMenuToggle()"
            >
              Menu
            </button>
            <h1 class="min-w-0 truncate text-base font-semibold capitalize sm:text-lg">{{ activeTab() }}</h1>
          </div>
          <span class="hidden text-sm text-slate-500 sm:block">Workspace local de protótipo</span>
        </div>
      </header>

      <main class="mx-auto w-full min-w-0 max-w-6xl space-y-4 px-3 py-4 sm:space-y-6 sm:px-6 sm:py-6">
        <ng-content />
      </main>
    </div>
  </div>
</div>
